name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.86.0
          components: rustfmt, clippy

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Check formatting
        run: pnpm format:check

      - name: Run Clippy
        run: pnpm lint

      - name: Build production artifacts
        run: pnpm build

  windows-installer:
    name: Windows installer
    runs-on: windows-latest
    needs: checks
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.86.0

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Build installer
        run: pnpm package:windows-installer

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rippr-Windows-Installer
          path: dist/windows/Rippr-Setup-1.0.0.exe
          if-no-files-found: error
